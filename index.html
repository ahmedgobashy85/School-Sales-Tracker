  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"73aa803e-7ae4-4091-a1d4-0fc94e5aed7e\"><\u002Fscript>\n<script src=\"2feb19e8-5212-46f9-a4d7-325dd37315d7\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <style>/* ============================================================\n   VANGUARD BUSINESS SOLUTIONS — COLOR TOKENS\n   Base palette derived from brand mark: Navy #0B2545 / Gold #C9A227.\n   Ramps built in OKLCH holding brand hue constant for consistent\n   perceptual lightness steps. Semantic aliases map palette -> usage.\n   ============================================================ */\n\n:root {\n  /* ---- Navy (primary) ---- */\n  --navy-950: oklch(16% 0.055 258);\n  --navy-900: oklch(21% 0.075 258); /* brand base #0B2545 */\n  --navy-800: oklch(28% 0.085 258);\n  --navy-700: oklch(36% 0.095 258);\n  --navy-600: oklch(45% 0.10 258);\n  --navy-500: oklch(55% 0.095 258);\n  --navy-400: oklch(66% 0.075 258);\n  --navy-300: oklch(77% 0.055 258);\n  --navy-200: oklch(87% 0.035 258);\n  --navy-100: oklch(93% 0.02 258);\n  --navy-50:  oklch(97% 0.01 258);\n\n  /* ---- Gold (accent) ---- */\n  --gold-900: oklch(32% 0.085 85);\n  --gold-800: oklch(42% 0.10 85);\n  --gold-700: oklch(52% 0.115 85);\n  --gold-600: oklch(63% 0.125 85);\n  --gold-500: oklch(73% 0.125 85); /* brand base #C9A227 */\n  --gold-400: oklch(80% 0.11 85);\n  --gold-300: oklch(87% 0.085 85);\n  --gold-200: oklch(92% 0.055 85);\n  --gold-100: oklch(96% 0.03 85);\n  --gold-50:  oklch(98% 0.015 85);\n\n  /* ---- Neutral (cool gray, tinted toward navy hue) ---- */\n  --gray-950: oklch(17% 0.012 258);\n  --gray-900: oklch(23% 0.013 258);\n  --gray-800: oklch(31% 0.013 258);\n  --gray-700: oklch(41% 0.013 258);\n  --gray-600: oklch(51% 0.012 258);\n  --gray-500: oklch(61% 0.011 258);\n  --gray-400: oklch(71% 0.009 258);\n  --gray-300: oklch(81% 0.008 258);\n  --gray-200: oklch(89% 0.006 258);\n  --gray-150: oklch(93.5% 0.005 258);\n  --gray-100: oklch(96.5% 0.004 258);\n  --gray-50:  oklch(98.5% 0.002 258);\n  --white: #ffffff;\n\n  /* ---- Semantic (feedback) ---- */\n  --success-700: oklch(42% 0.13 148);\n  --success-500: oklch(56% 0.14 148);\n  --success-100: oklch(94% 0.05 148);\n  --warning-700: oklch(48% 0.13 75);\n  --warning-500: oklch(72% 0.15 78);\n  --warning-100: oklch(94% 0.06 85);\n  --danger-700: oklch(42% 0.17 25);\n  --danger-500: oklch(56% 0.19 25);\n  --danger-100: oklch(94% 0.05 22);\n  --info-700: oklch(42% 0.11 235);\n  --info-500: oklch(56% 0.12 235);\n  --info-100: oklch(94% 0.03 235);\n\n  /* ================= Semantic aliases ================= */\n  /* Surfaces */\n  --surface-page: var(--gray-50);\n  --surface-card: var(--white);\n  --surface-sunken: var(--gray-100);\n  --surface-inverse: var(--navy-900);\n  --surface-inverse-sunken: var(--navy-800);\n  --surface-overlay: oklch(21% 0.075 258 / 0.55);\n\n  /* Text */\n  --text-primary: var(--gray-900);\n  --text-secondary: var(--gray-600);\n  --text-muted: var(--gray-500);\n  --text-inverse: var(--white);\n  --text-inverse-muted: var(--navy-200);\n  --text-on-gold: var(--navy-950);\n  --text-link: var(--navy-700);\n  --text-link-hover: var(--navy-900);\n\n  /* Borders */\n  --border-subtle: var(--gray-150);\n  --border-default: var(--gray-200);\n  --border-strong: var(--gray-300);\n  --border-inverse: oklch(100% 0 0 / 0.14);\n  --border-focus: var(--gold-600);\n\n  /* Brand accents */\n  --brand-primary: var(--navy-900);\n  --brand-primary-hover: var(--navy-800);\n  --brand-primary-active: var(--navy-950);\n  --brand-gold: var(--gold-500);\n  --brand-gold-hover: var(--gold-600);\n  --brand-gold-active: var(--gold-700);\n\n  /* Feedback aliases */\n  --feedback-success-fg: var(--success-700);\n  --feedback-success-bg: var(--success-100);\n  --feedback-warning-fg: var(--warning-700);\n  --feedback-warning-bg: var(--warning-100);\n  --feedback-danger-fg: var(--danger-700);\n  --feedb n.\n   ============================================================ */\n\n:root {\n  /* Radii — modest, businesslike. No pill-everything, no sharp 0. */\n  --radius-sm: 4px;\n  --radius-md: 8px;\n  --radius-lg: 12px;\n  --radius-xl: 16px;\n  --radius-pill: 999px;\n\n  /* Borders */\n  --border-width-sm: 1px;\n  --border-width-md: 1.5px;\n\n  /* Shadows — navy-tinted, tight and low-opacity for a crisp, precise feel */\n  --shadow-xs: 0 1px 2px oklch(21% 0.075 258 / 0.06);\n  --shadow-sm: 0 1px 3px oklch(21% 0.075 258 / 0.08), 0 1px 2px oklch(21% 0.075 258 / 0.05);\n  --shadow-md: 0 4px 10px oklch(21% 0.075 258 / 0.10), 0 2px 4px oklch(21% 0.075 258 / 0.06);\n  --shadow-lg: 0 12px 24px oklch(21% 0.075 258 / 0.14), 0 4px 8px oklch(21% 0.075 258 / 0.06);\n  --shadow-xl: 0 24px 48px oklch(21% 0.075 258 / 0.18), 0 8px 16px oklch(21% 0.075 258 / 0.08);\n  --shadow-focus: var(--focus-ring);\n\n  /* Motion — brisk and purposeful, no bounce (corporate confidence, not playfulness) */\n  --ease-standard: cubic-bezier(0.2, 0.6, 0.2, 1); /* @kind other */\n  --ease-in: cubic-bezier(0.4, 0, 1, 1); /* @kind other */\n  --ease-out: cubic-bezier(0, 0, 0.2, 1); /* @kind other */\n  --duration-fast: 120ms; /* @kind other */\n  --duration-base: 200ms; /* @kind other */\n  --duration-slow: 320ms; /* @kind other */\n}\n<\u002Fstyle>\n  <style>/* Minimal base reset — typography defaults applied globally so any\n   consumer linking styles.css gets sensible text out of the box. */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nhtml {\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nbody {\n  margin: 0;\n  font-family: var(--font-body);\n  font-size: var(--text-body-md-size);\n  line-height: var(--text-body-md-line);\n  color: var(--text-primary);\n  background: var(--surface-page);\n}\n\nh1, h2, h3, h4, h5, h6 {\n  font-family: var(--font-display);\n  margin: 0;\n}\n\np { margin: 0; }\n\na {\n  color: var(--text-link);\n  text-decoration: none;\n}\na:hover { color: var(--text-link-hover); text-decoration: underline; }\n\nbutton, input, select, textarea { font-family: inherit; }\n<\u002Fstyle>\n  <style>/* ============================================================\n   VANGUARD BUSINESS SOLUTIONS — COLOR TOKENS\n   Base palette derived from brand mark: Navy #0B2545 / Gold #C9A227.\n   Ramps built in OKLCH holding brand hue constant for consistent\n   perceptual lightness steps. Semantic aliases map palette -> usage.\n   ============================================================ */\n\n:root {\n  /* ---- Navy (primary) ---- */\n  --navy-950: oklch(16% 0.055 258);\n  --navy-900: oklch(21% 0.075 258); /* brand base #0B2545 */\n  --navy-800: oklch(28% 0.085 258);\n  --navy-700: oklch(36% 0.095 258);\n  --navy-600: oklch(45% 0.10 258);\n  --navy-500: oklch(55% 0.095 258);\n  --navy-400: oklch(66% 0.075 258);\n  --navy-300: oklch(77% 0.055 258);\n  --navy-200: oklch(87% 0.035 258);\n  --navy-100: oklch(93% 0.02 258);\n  --navy-50:  oklch(97% 0.01 258);\n\n  /* ---- Gold (accent) ---- */\n  --gold-900: oklch(32% 0.085 85);\n  --gold-800: oklch(42% 0.10 85);\n  --gold-700: oklch(52% 0.115 85);\n  --gold-600: oklch(63% 0.125 85);\n  --gold-500: oklch(73% 0.125 85); /* brand base #C9A227 */\n  --gold-400: oklch(80% 0.11 85);\n  --gold-300: oklch(87% 0.085 85);\n  --gold-200: oklch(92% 0.055 85);\n  --gold-100: oklch(96% 0.03 85);\n  --gold-50:  oklch(98% 0.015 85);\n\n  /* ---- Neutral (cool gray, tinted toward navy hue) ---- */\n  --gray-950: oklch(17% 0.012 258);\n  --gray-900: oklch(23% 0.013 258);\n  --gray-800: oklch(31% 0.013 258);\n  --gray-700: oklch(41% 0.013 258);\n  --gray-600: oklch(51% 0.012 258);\n  --gray-500: oklch(61% 0.011 258);\n  --gray-400: oklch(71% 0.009 258);\n  --gray-300: oklch(81% 0.008 258);\n  --gray-200: oklch(89% 0.006 258);\n  --gray-150: oklch(93.5% 0.005 258);\n  --gray-100: oklch(96.5% 0.004 258);\n  --gray-50:  oklch(98.5% 0.002 258);\n  --white: #ffffff;\n\n  /* ---- Semantic (feedback) ---- */\n  --success-700: oklch(42% 0.13 148);\n  --success-500: oklch(56% 0.14 148);\n  --success-100: oklch(94% 0.05 148);\n  --warning-700: oklch(48% 0.13 75);\n  --warning-500: oklch(72% 0.15 78);\n  --warning-100: oklch(94% 0.06 85);\n  --danger-700: oklch(42% 0.17 25);\n  --danger-500: oklch(56% 0.19 25);\n  --danger-100: oklch(94% 0.05 22);\n  --info-700: oklch(42% 0.11 235);\n  --info-500: oklch(56% 0.12 235);\n  --info-100: oklch(94% 0.03 235);\n\n  /* ================= Semantic aliases ================= */\n  /* Surfaces */\n  --surface-page: var(--gray-50);\n  --surface-card: var(--white);\n  --surface-sunken: var(--gray-100);\n  --surface-inverse: var(--navy-900);\n  --surface-inverse-sunken: var(--navy-800);\n  --surface-overlay: oklch(21% 0.075 258 / 0.55);\n\n  /* Text */\n  --text-primary: var(--gray-900);\n  --text-secondary: var(--gray-600);\n  --text-muted: var(--gray-500);\n  --text-inverse: var(--white);\n  --text-inverse-muted: var(--navy-200);\n  --text-on-gold: var(--navy-950);\n  --text-link: var(--navy-700);\n  --text-link-hover: var(--navy-900);\n\n  /* Borders */\n  --border-subtle: var(--gray-150);\n  --border-default: var(--gray-200);\n  --border-strong: var(--gray-300);\n  --border-inverse: oklch(100% 0 0 / 0.14);\n  --border-focus: var(--gold-600);\n\n  /* Brand accents */\n  --brand-primary: var(--navy-900);\n  --brand-primary-hover: var(--navy-800);\n  --brand-primary-active: var(--navy-950);\n  --brand-gold: var(--gold-500);\n  --brand-gold-hover: var(--gold-600);\n  --brand-gold-active: var(--gold-700);\n\n  /* Feedback aliases */\n  --feedback-success-fg: var(--success-700);\n  --feedback-success-bg: var(--success-100);\n  --feedback-warning-fg: var(--warning-700);\n  --feedback-warning-bg: var(--warning-100);\n  --feedback-danger-fg: var(--danger-700);\n  --feedback-danger-bg: var(--danger-100);\n  --feedback-info-fg: var(--info-700);\n  --feedback-info-bg: var(--info-100);\n\n  --focus-ring: 0 0 0 3px oklch(73% 0.125 85 / 0.45);\n}\n\n/* ============================================================\n   VANGUARD BUSINESS SOLUTIONS — WEBFONTS\n   Display: Exo 2 (as specified in the brand's logo lockup file).\n   Body/UI: Inter — neutral, highly legible workhorse sans that\n   pairs cleanly with Exo 2's geometric character without competing\n   with it. Both are Google Fonts, loaded here as direct @font-face\n   rules against Google's font CDN so the closure is self-declared.\n   ============================================================ */\n\n@font-face {\n  font-family: 'Exo 2';\n  font-style: normal;\n  font-weight: 400 800;\n  font-display: swap;\n  src: url('https://fonts.gstatic.com/s/exo2/v22/7cH1v4okm5zmbtYtMWzZ2cydcCM9YFo2ZlU.woff2') format('woff2');\n}\n\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 400 800;\n  font-display: swap;\n  src: url('https://fonts.gstatic.com/s/inter/v18/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMa1ZL7.woff2') format('woff2');\n}\n\n/* Fallback: if the pinned woff2 URLs above ever go stale, this CSS2\n   import guarantees both families still resolve. */\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Exo 2';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"5dc67855-aec2-4af3-9433-12637b38f43f\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Exo 2';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"f9be496f-c3ca-4a89-b323-8332c4dd7693\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Exo 2';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"7a6f98ce-9b86-4e3f-ad92-74b5ec936673\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, display-md-weight: 600;\n  --text-display-md-tracking: 0;\n\n  --text-display-sm-size: 22px;\n  --text-display-sm-line: 1.25;\n  --text-display-sm-weight: 600;\n  --text-display-sm-tracking: 0;\n\n  /* Body scale (Inter) */\n  --text-body-lg-size: 18px;\n  --text-body-lg-line: 1.6;\n  --text-body-lg-weight: 400;\n\n  --text-body-md-size: 15px;\n  --text-body-md-line: 1.6;\n  --text-body-md-weight: 400;\n\n  --text-body-sm-size: 13px;\n  --text-body-sm-line: 1.55;\n  --text-body-sm-weight: 400;\n\n  --text-label-size: 13px;\n  --text-label-line: 1.3;\n  --text-label-weight: 600;\n  --text-label-tracking: 0.02em;\n\n  --text-caption-size: 12px;\n  --text-caption-line: 1.4;\n  --text-caption-weight: 500;\n  --text-caption-tracking: 0.03em;\n\n  --text-overline-size: 11px;\n  --text-overline-line: 1.3;\n  --text-overline-weight: 700;\n  --text-overline-tracking: 0.12em;\n}\n\n/* ============================================================\n   VANGUARD BUSINESS SOLUTIONS — SPACING TOKENS\n   4px base unit. Used for padding, gaps, and layout rhythm.\n   ============================================================ */\n\n:root {\n  --space-0: 0px;\n  --space-1: 2px;\n  --space-2: 4px;\n  --space-3: 8px;\n  --space-4: 12px;\n  --space-5: 16px;\n  --space-6: 20px;\n  --space-7: 24px;\n  --space-8: 32px;\n  --space-9: 40px;\n  --space-10: 48px;\n  --space-11: 64px;\n  --space-12: 80px;\n  --space-13: 96px;\n  --space-14: 128px;\n\n  /* Layout */\n  --container-max: 1280px;\n  --container-narrow: 760px;\n  --page-gutter: 40px;\n}\n\n/* ============================================================\n   VANGUARD BUSINESS SOLUTIONS — EFFECT TOKENS\n   Radii, shadows (navy-tinted, low-diffusion — corporate not soft),\n   borders, and motion.\n   ============================================================ */\n\n:root {\n  /* Radii — modest, businesslike. No pill-everything, no sharp 0. */\n  --radius-sm: 4px;\n  --radius-md: 8px;\n  --radius-lg: 12px;\n  --radius-xl: 16px;\n  --radius-pill: 999px;\n\n  /* Borders */\n  --border-width-sm: 1px;\n  --border-width-md: 1.5px;\n\n  /* Shadows — navy-tinted, tight and low-opacity for a crisp, precise feel */\n  --shadow-xs: 0 1px 2px oklch(21% 0.075 258 / 0.06);\n  --shadow-sm: 0 1px 3px oklch(21% 0.075 258 / 0.08), 0 1px 2px oklch(21% 0.075 258 / 0.05);\n  --shadow-md: 0 4px 10px oklch(21% 0.075 258 / 0.10), 0 2px 4px oklch(21% 0.075 258 / 0.06);\n  --shadow-lg: 0 12px 24px oklch(21% 0.075 258 / 0.14), 0 4px 8px oklch(21% 0.075 258 / 0.06);\n  --shadow-xl: 0 24px 48px oklch(21% 0.075 258 / 0.18), 0 8px 16px oklch(21% 0.075 258 / 0.08);\n  --shadow-focus: var(--focus-ring);\n\n  /* Motion — brisk and purposeful, no bounce (corporate confidence, not playfulness) */\n  --ease-standard: cubic-bezier(0.2, 0.6, 0.2, 1); /* @kind other */\n  --ease-in: cubic-bezier(0.4, 0, 1, 1); /* @kind other */\n  --ease-out: cubic-bezier(0, 0, 0.2, 1); /* @kind other */\n  --duration-fast: 120ms; /* @kind other */\n  --duration-base: 200ms; /* @kind other */\n  --duration-slow: 320ms; /* @kind other */\n}\n\n/* Minimal base reset — typography defaults applied globally so any\n   consumer linking styles.css gets sensible text out of the box. */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nhtml {\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nbody {\n  margin: 0;\n  font-family: var(--font-body);\n  font-size: var(--text-body-md-size);\n  line-height: var(--text-body-md-line);\n  color: var(--text-primary);\n  background: var(--surface-page);\n}\n\nh1, h2, h3, h4, h5, h6 {\n  font-family: var(--font-display);\n  margin: 0;\n}\n\np { margin: 0; }\n\na {\n  color: var(--text-link);\n  text-decoration: none;\n}\na:hover { color: var(--text-link-hover); text-decoration: underline; }\n\nbutton, input, select, textarea { font-family: inherit; }\n\n<\u002Fstyle>\n  <script src=\"f51e44f8-c679-4a04-8b61-8a7db300c5b4\"><\u002Fscript>\n  <style>\n    body { margin: 0; background: va ;\">\n            <x-import component-from-global-scope=\"VanguardBusinessSolutionsDesignSystem_cde2a3.Button\" variant=\"secondary\" on-click=\"{{ cancelDelete }}\" hint-size=\"90px,40px\">Cancel<\u002Fx-import>\n            <x-import component-from-global-scope=\"VanguardBusinessSolutionsDesignSystem_cde2a3.Button\" variant=\"danger\" on-click=\"{{ confirmDelete }}\" hint-size=\"130px,40px\">Delete school<\u002Fx-import>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fx-import>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ CLOUD SYNC SETTINGS ============ -->\n  <sc-if value=\"{{ cloudOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position: fixed; inset: 0; z-index: 80;\">\n      <x-import component-from-global-scope=\"VanguardBusinessSolutionsDesignSystem_cde2a3.Dialog\" open=\"{{ true }}\" title=\"Cloud sync — GitHub\" on-close=\"{{ closeCloud }}\" width=\"{{ 620 }}\" hint-size=\"620px,480px\">\n        <div style=\"max-height: 66vh; overflow: auto; display: flex; flex-direction: column; gap: 14px; font-size: 13px; line-height: 1.6; padding-right: 2px;\">\n          <p style=\"margin: 0; color: var(--text-secondary);\">Connect your GitHub repository and every change — schools, contacts, orders, statuses — is saved to a <b>tracker-data.json<\u002Fb> file in the repo. Open the tracker on any device with the same token and it loads the same data.<\u002Fp>\n          <div style=\"background: var(--surface-sunken); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg, 12px); padding: 12px 16px;\">\n            <div style=\"font-weight: 700; margin-bottom: 6px;\">Get a token (one time, ~2 minutes)<\u002Fdiv>\n            <ol style=\"margin: 0; padding-left: 18px; display: flex; flex-direction: column; gap: 4px; color: var(--text-secondary);\">\n              <li>On github.com: <b>Settings → Developer settings → Personal access tokens → Fine-grained tokens → Generate new token<\u002Fb><\u002Fli>\n              <li><b>Repository access:<\u002Fb> Only select repositories → <b>School-Sales-Tracker<\u002Fb><\u002Fli>\n              <li><b>Permissions → Repository permissions → Contents: Read and write<\u002Fb><\u002Fli>\n              <li>Click Generate, copy the token (starts with <b>github_pat_<\u002Fb>) and paste it below<\u002Fli>\n            <\u002Fol>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size: 12px; font-weight: 600; color: var(--text-primary); margin-bottom: 5px;\">GitHub token<\u002Fdiv>\n            <input type=\"password\" value=\"{{ ghForm.token }}\" data-field=\"token\" sc-camel-on-change=\"{{ onGhInput }}\" placeholder=\"github_pat_…\" style=\"width: 100%; box-sizing: border-box; padding: 9px 12px; border: 1px solid var(--border-default); border-radius: var(--radius-md, 8px); font-family: var(--font-body); font-size: 13px; color: var(--text-primary); background: var(--surface-card);\">\n          <\u002Fdiv>\n          <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 10px;\">\n            <x-import component-from-global-scope=\"VanguardBusinessSolutionsDesignSystem_cde2a3.Input\" label=\"GitHub username\" size=\"sm\" value=\"{{ ghForm.owner }}\" data-field=\"owner\" on-change=\"{{ onGhInput }}\" hint-size=\"100%,54px\"><\u002Fx-import>\n            <x-import component-from-global-scope=\"VanguardBusinessSolutionsDesignSystem_cde2a3.Input\" label=\"Repository\" size=\"sm\" value=\"{{ ghForm.repo }}\" data-field=\"repo\" on-change=\"{{ onGhInput }}\" hint-size=\"100%,54px\"><\u002Fx-import>\n            <x-import component-from-global-scope=\"VanguardBusinessSolutionsDesignSystem_cde2a3.Input\" label=\"Branch\" size=\"sm\" value=\"{{ ghForm.branch }}\" data-field=\"branch\" on-change=\"{{ onGhInput }}\" hint-size=\"100%,54px\"><\u002Fx-import>\n            <x-import component-from-global-scope=\"VanguardBusinessSolutionsDesignSystem_cde2a3.Input\" label=\"Data file\" size=\"sm\" value=\"{{ ghForm.path }}\" data-field=\"path\" on-change=\"{{ onGhInput }}\" hint-size=\"100%,54px\"><\u002Fx-import>\n          <\u002Fdiv>\n          <sc-if value=\"{{ cloudMsg }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background: var(--feedback-danger-bg); color: var(--feedback-danger-fg); border-radius: var(--radius-md, 8px); padding: 9px 12px; font-size: 12.5px;\">{{ cloudMsg }}<\u002Fdiv>\n          <\u002Fsc-if>\n          <p style=\"margin: 0; font-size: 11.5px; color: var(--text-muted);\">The token is stored only in this browser — you'll paste it once on each device you use. Anyone with the token can edit the repo, so don't share it.<\u002Fp>\n          <div style=\"display: flex; justify-content: flex-end; gap: 10px;\">\n            <sc-if value=\"{{ ghConnected }}\" hint-placeholder-val=\"{{ false }}\">\n              <x-import component-from-global-scope=\"VanguardBusinessSolutionsDesignSystem_cde2a3.Button\" variant=\"ghost\" on-click=\"{{ ghDisconnect }}\" hint-size=\"110px,40px\">Disconnect<\u002Fx-import>\n            <\u002Fsc-if>\n            <x-import component-from-global-scope=\"VanguardBusinessSolutionsDesignSystem_cde2a3.Button\" variant=\"secondary\" on-click=\"{{ closeCloud }}\" hint-size=\"90px,40px\">Cancel<\u002Fx-import>\n            <x-import component-from-global-scope=\"VanguardBusinessSolutionsDesignSystem_cde2a3.Button\" variant=\"gold\" on-click=\"{{ ghConnect }}\" hint-size=\"150px,40px\">Save &amp; connect<\u002Fx-import>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fx-import>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- toast -->\n  <sc-if value=\"{{ toast }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position: fixed; bottom: 22px; right: 22px; z-index: 90; background: var(--navy-900); color: #fff; padding: 10px 18px; border-radius: var(--radius-lg, 12px); font-family: var(--font-body); font-size: 13px; font-weight: 600; box-shadow: var(--shadow-lg);\">{{ toast }}<\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;hideValues&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Display&quot;, &quot;description&quot;: &quot;Hide all SAR amounts (for screen sharing)&quot; },\n  &quot;compact&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Display&quot;, &quot;description&quot;: &quot;Tighter table rows&quot; }\n}\">\nclass Component extends DCLogic {\n  state = {\n    schools: [],\n    loaded: false,\n    view: 'list',\n    selId: null,\n    q: '',\n    filter: null,\n    sortKey: 'value',\n    sortDir: -1,\n    form: null,\n    formMode: 'add',\n    oform: null,\n    oformMode: 'add',\n    confirmId: null,\n    toast: '',\n    cloud: 'off',\n    cloudMsg: '',\n    cloudOpen: false,\n    ghForm: null\n  };\n\n  LS_KEY = 'ce_school_sales_crm_v1';\n  GH_KEY = 'ce_gh_sync_cfg_v1';\n\n  STATUSES = [\n    { k: 'Delivered / Done', tone: 'success', group: 'won' },\n    { k: 'Approved – PO collected', tone: 'success', group: 'won' },\n    { k: 'Under approval', tone: 'info', group: 'active' },\n    { k: 'Confirmed – pending payment', tone: 'warning', group: 'active' },\n    { k: 'Pending late payment', tone: 'danger', group: 'active' },\n    { k: 'Quotation sent', tone: 'navy', group: 'active' },\n    { k: 'Demo sent', tone: 'navy', group: 'active' },\n    { k: 'Booklist received', tone: 'info', group: 'active' },\n    { k: 'Pending follow-up', tone: 'warning', group: 'active' },\n    { k: 'Lead / new', tone: 'neutral', group: 'active' },\n    { k: 'Canceled / Declined', tone: 'danger', group: 'lost' }\n  ];\n\n  CHIP_COLORS = {\n    success: ['var(--feedback-success-bg)', 'var(--feedback-success-fg)'],\n    warning: ['var(--feedback-warning-bg)', 'var(--feedback-warning-fg)'],\n    danger: ['var(--feedback-danger-bg)', 'var(--feedback-danger-fg)'],\n    info: ['var(--feedback-info-bg)', 'var(--feedback-info-fg)'],\n    navy: ['var(--navy-100)', 'var(--navy-800)'],\n    gold: ['var(--gold-100)', 'var(--gold-800)'],\n    neutral: ['var(--gray-150)', 'var(--gray-700)']\n  };\n\n  componentDidMount() {\n    if (window.CE_SEED) this.boot(window.CE_SEED);\n    else import('./schools-data.js').then((m) => this.boot(m.SEED));\n  }\n\n  boot(seed) {\n    let schools = null, localAt = 0;\n    try {\n      const saved = JSON.parse(localStorage.getItem(this.LS_KEY));\n      if (saved && Array.isArray(saved.schools) && saved.schools.length) { schools = saved.schools; localAt = Date.parse(saved.savedAt) || 0; }\n    } catch (e) { /* ignore */ }\n    if (!schools) schools = seed.map((s) => ({ ...s }));\n    this.setState({ schools, loaded: true, cloud: this.ghCfg() ? 'syncing' : 'off' });\n    this.cloudLoad(localAt);\n  }\n\n  /* ---------- GitHub cloud sync ---------- */\n  ghCfg() {\n    try { const c = JSON.parse(localStorage.getItem(this.GH_KEY)); return c && c.token ? c : null; } catch (e) { return null; }\n  }\n\n  ghUrl(c) {\n    return 'https://api.github.com/repos/' + c.owner + '/' + c.repo + '/contents/' + encodeURIComponent(c.path);\n  }\n\n  ghHeaders(c) {\n    return { Authorization: 'Bearer ' + c.token, Accept: 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28' };\n  }\n\n  b64enc(str) { return btoa(unescape(encodeURIComponent(str))); }\n  b64dec(b) { return decodeURIComponent(escape(atob(String(b).replace(/\\n/g, '')))); }\n\n  async cloudLoad(localAt) {\n    const c = this.ghCfg();\n    if (!c) { this.setState({ cloud: 'off' }); return; }\n    this.setState({ cloud: 'syncing', cloudMsg: '' });\n    try {\n      const res = await fetch(this.ghUrl(c) + '?ref=' + encodeURIComponent(c.branch) + '&_=' + Date.now(), { headers: this.ghHeaders(c) });\n      if (res.status === 404) { this._sha = null; this.cloudSave(); return; }\n      if (res.status === 401 || res.status === 403) { this.setState({ cloud: 'error', cloudMsg: 'GitHub rejected the token — check it has Contents: Read and write on this repository, and has not expired.' }); return; }\n      if (!res.ok) throw new Error('HTTP ' + res.status);\n      const j = await res.json();\n      this._sha = j.sha;\n      const data = JSON.parse(this.b64dec(j.content));\n      const cloudAt = Date.parse(data.savedAt) || 0;\n      if (Array.isArray(data.schools) && data.schools.length && cloudAt >= localAt) {\n        this.setState({ schools: data.schools, cloud: 'synced' });\n        localStorage.setItem(this.LS_KEY, JSON.stringify({ savedAt: data.savedAt || new Date().toISOString(), schools: data.schools }));\n      } else {\n        this.cloudSave();\n      }\n    } catch (e) {\n      this.setState({ cloud: 'error', cloudMsg: 'Could not reach GitHub — check your internet connection and settings.' });\n    }\n  }\n\n  scheduleCloudSave() {\n    if (!this.ghCfg()) return;\n    this.setState({ cloud: 'syncing' });\n    clearTimeout(this._cloudT);\n    this._cloudT = setTimeout(() => this.cloudSave(), 1200);\n  }\n\n  async cloudSave(isRetry) {\n    const c = this.ghCfg();\n    if (!c) return;\n    this.setState({ cloud: 'syncing' });\n    const payload = JSON.stringify({ savedAt: new Date().toISOString(), schools: this.state.schools }, null, 1);\n    try {\n      const body = { message: 'Update school sales data (from tracker)', content: this.b64enc(payload), branch: c.branch };\n      if (this._sha) body.sha = this._sha;\n      const res = await fetch(this.ghUrl(c), { method: 'PUT', headers: { ...this.ghHeaders(c), 'Content-Type': 'application/json' }, body: JSON.stringify(body) });\n      if ((res.status === 409 || res.status === 422) && !isRetry) {\n        const r2 = await fetch(this.ghUrl(c) + '?ref=' + encodeURIComponent(c.branch) + '&_=' + Date.now(), { headers: this.ghHeaders(c) });\n        if (r2.ok) { const j2 = await r2.json(); this._sha = j2.sha; }\n        return this.cloudSave(true);\n      }\n      if (res.status === 401 || res.status === 403) { this.setState({ cloud: 'error', cloudMsg: 'GitHub rejected the token — check it has Contents: Read and write on this repository.' }); return; }\n      if (!res.ok) throw new Error('HTTP ' + res.status);\n      const j = await res.json();\n      this._sha = j.content && j.content.sha;\n      this.setState({ cloud: 'synced' });\n    } catch (e) {\n      this.setState({ cloud: 'error', cloudMsg: 'Saving to GitHub failed — your data is still safe on this device and will retry on the next change.' });\n    }\n  }\n\n  persist(schools, msg) {\n    localStorage.setItem(this.LS_KEY, JSON.stringify({ savedAt: new Date().toISOString(), schools }));\n    this.scheduleCloudSave();\n    clearTimeout(this._toastT);\n    this.setState({ toast: msg || 'Saved' });\n    this._toastT = setTimeout(() => this.setState({ toast: '' }), 1400);\n  }\n\n  update(id, patch, msg) {\n    const schools = this.state.schools.map((s) => (s.id === id ? { ...s, ...patch, updatedAt: new Date().toISOString() } : s));\n    this.setState({ schools });\n    this.persist(schools, msg);\n  }\n\n  statusInfo(k) {\n    return this.STATUSES.find((s) => s.k === k) || { k, tone: 'neutral', group: 'active' };\n  }\n\n  fmt(n) {\n    if (this.props.hideValues) return '•••';\n    if (n === null || n === undefined || n === '' || isNaN(Number(n))) return '—';\n    return 'SAR ' + Number(n).toLocaleString('en-US', { maximumFractionDigits: 2 });\n  }\n\n  emptyForm() {\n    return {\n      name: '', nameAr: '', code: '', city: '', district: '', region: '', curriculum: '', grades: '',\n      tuition: '', phone: '', whatsapp: '', email: '', website: '', address: '', mapsUrl: '',\n      status: 'Lead / new', value: '', products: '', docs: '', notes: '',\n      contacts: []\n    };\n  }\n\n  slug(name) {\n    const base = (name || 'school').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 24);\n    return base + '-' + Date.now().toString(36);\n  }\n\n  icon(name, size) {\n    const NS = window.VanguardBusinessSolutionsDesignSystem_cde2a3;\n    if (!NS || !NS.Icon) return null;\n    return React.createElement(NS.Icon, { name, size: size || 15 });\n  }\n\n  renderVals() {\n    const st = this.state;\n    const schools = st.schools || [];\n    const self = this;\n\n    /* ---- KPIs ---- */\n    const kActive = schools.filter((s) => this.statusInfo(s.status).group === 'active').length;\n    const kWon = schools.filter((s) => this.statusInfo(s.status).group === 'won').length;\n    const totalValue = schools.reduce((a, s) => a + (Number(s.value) || 0), 0);\n\n    /* ---- chips ---- */\n    const counts = {};\n    schools.forEach((s) => { counts[s.status] = (counts[s.status] || 0) + 1; });\n    const chips = this.STATUSES.map((s) => {\n      const active = st.filter === s.k;\n      const [bg, fg] = this.CHIP_COLORS[s.tone];\n      return {\n        label: s.k,\n        count: counts[s.k] || 0,\n        bg: active ? fg : bg,\n        fg: active ? '#ffffff' : fg,\n        border: active ? '1px solid transparent' : '1px solid transparent',\n        toggle: () => self.setState({ filter: active ? null : s.k })\n      };\n    });\n\n    /* ---- list rows ---- */\n    let rows = schools.slice();\n    if (st.filter) rows = rows.filter((r) => r.status === st.filter);\n    if (st.q) {\n      const t = st.q.toLowerCase();\n      rows = rows.filter((r) => {\n        const contactStr = (r.contacts || []).map((c) => c.name + ' ' + c.mobile + ' ' + c.email).join(' ');\n        return [r.name, r.nameAr, r.city, r.district, r.curriculum, r.products, r.notes, r.status, contactStr].join(' ').toLowerCase().includes(t);\n      });\n    }\n    const key = st.sortKey, dir = st.sortDir;\n    rows.sort((a, b) => {\n      if (key === 'value') { return ((Number(a.value) || -1) - (Number(b.value) || -1)) * dir; }\n      const x = String(a[key] || '').toLowerCase(), y = String(b[key] || '').toLowerCase();\n      return x < y ? -dir : x > y ? dir : 0;\n    });\n\n    const rowsV = rows.map((r) => {\n      const primary = (r.contacts || [])[0];\n      const lastOrder = (r.orders || [])[(r.orders || []).length - 1];\n      const subBits = [r.curriculum, r.grades, r.district].filter(Boolean);\n      return {\n        id: r.id,\n        name: r.name,\n        city: r.city || '',\n        sub: subBits.join(' · ') || '—',\n        contactName: primary ? (primary.name + (primary.role ? ' · ' + primary.role : '')) : '—',\n        contactPhone: primary && primary.mobile ? primary.mobile : (r.phone || ''),\n        status: r.status,\n        updated: r.updatedAt ? 'Updated ' + new Date(r.updatedAt).toLocaleDateString() : '',\n        valueFmt: this.fmt(r.value),\n        latestOrder: lastOrder ? (lastOrder.title + (lastOrder.items ? ' — ' + lastOrder.items : '')) : '—',\n        open: () => self.setState({ view: 'detail', selId: r.id }),\n        setStatus: (e) => self.update(r.id, { status: e.target.value }, 'Status updated')\n      };\n    });\n\n    /* ---- detail ---- */\n    const s = schools.find((x) => x.id === st.selId);\n    let sel = null;\n    if (s) {\n      const infoRows = [];\n      const push = (label, value, href) => { if (value) infoRows.push({ label, value, href: href || '', plain: !href }); };\n      push('Website', s.website ? s.website.replace(/^https?:\\/\\//, '') : '', s.website);\n      push('Main phone', s.phone);\n      push('Email', s.email, s.email ? 'mailto:' + s.email : '');\n      push('WhatsApp', s.whatsapp, s.whatsapp ? 'https://wa.me/966' + String(s.whatsapp).replace(/\\D/g, '').replace(/^0/, '') : '');\n      push('Address', s.address);\n      push('Map', s.mapsUrl ? 'Open in Google Maps' : '', s.mapsUrl);\n      push('Region', s.region);\n      push('Type', s.schoolType);\n      push('Genders', s.genders);\n      push('Grades', [s.gradeStages, s.grades].filter(Boolean).join(' · '));\n      push('Tuition', s.tuition);\n      if (!infoRows.length) infoRows.push({ label: 'Info', value: 'No details on file — use Edit school to add them.', href: '', plain: true });\n\n      const contactsV = (s.contacts || []).map((c) => ({\n        ...c,\n        role: c.role || '—',\n        telHref: 'tel:' + String(c.mobile || '').replace(/[^\\d+]/g, ''),\n        mailHref: 'mailto:' + (c.email || ''),\n        waHref: 'https://wa.me/966' + String(c.whatsapp || '').replace(/\\D/g, '').replace(/^0/, '')\n      }));\n\n      const ordersV = (s.orders || []).slice().reverse().map((o) => ({\n        ...o,\n        date: o.date || '—',\n        ref: o.ref || '',\n        detail: [o.items, o.notes].filter(Boolean).join(' · '),\n        tone: this.statusInfo(o.status).tone,\n        valueFmt: o.value !== null && o.value !== undefined && o.value !== '' ? this.fmt(o.value) : '',\n        edit: () => self.setState({ oform: { ...o, value: o.value === null || o.value === undefined ? '' : String(o.value) }, oformMode: 'edit' }),\n        del: () => {\n          const orders = (s.orders || []).filter((x) => x.id !== o.id);\n          self.update(s.id, { orders }, 'Order deleted');\n        }\n      }));\n\n      sel = {\n        name: s.name,\n        nameAr: s.nameAr || '',\n        status: s.status,\n        tone: this.statusInfo(s.status).tone,\n        metaTags: [\n          [s.city, s.district].filter(Boolean).join(' · '),\n          s.curriculum, s.grades ? 'Grades ' + s.grades : '', s.code\n        ].filter(Boolean),\n        valueFmt: this.fmt(s.value),\n        valueRaw: s.value === null || s.value === undefined ? '' : String(s.value),\n        orderCount: String((s.orders || []).length),\n        products: s.products || '—',\n        docs: s.docs || '',\n        notes: s.notes || '',\n        contactsV,\n        noContacts: contactsV.length === 0,\n        infoRows,\n        ordersV,\n        noOrders: ordersV.length === 0\n      };\n    }\n\n    /* ---- form contacts ---- */\n    const form = st.form;\n    const formContacts = form ? form.contacts.map((c, i) => ({\n      ...c,\n      onField: (e) => {\n        const f = e.target.dataset.field;\n        const contacts = form.contacts.map((x, j) => (j === i ? { ...x, [f]: e.target.value } : x));\n        self.setState({ form: { ...form, contacts } });\n      },\n      toggleDm: () => {\n        const contacts = form.contacts.map((x, j) => (j === i ? { ...x, decisionMaker: !x.decisionMaker } : x));\n        self.setState({ form: { ...form, contacts } });\n      },\n      remove: () => {\n        const contacts = form.contacts.filter((x, j) => j !== i);\n        self.setState({ form: { ...form, contacts } });\n      }\n    })) : [];\n\n    const arrow = (k) => (st.sortKey === k ? (st.sortDir === 1 ? '↑' : '↓') : '');\n\n    return {\n      /* header */\n      kSchools: String(schools.length),\n      kActive: String(kActive),\n      kWon: String(kWon),\n      kValue: this.fmt(totalValue),\n\n      /* view flags */\n      isList: st.view === 'list',\n      isDetail: st.view === 'detail' && !!sel,\n      isForm: st.view === 'form' && !!form,\n\n      /* list */\n      chips,\n      rows: rowsV,\n      noRows: st.loaded && rowsV.length === 0,\n      resultNote: rowsV.length + ' of ' + schools.length + ' schools shown',\n      rowPad: this.props.compact ? '8px' : '13px',\n      q: st.q,\n      onSearch: (e) => self.setState({ q: e.target.value }),\n      statusOptions: this.STATUSES.map((x) => x.k),\n      sortByName: () => self.toggleSort('name'),\n      sortByStatus: () => self.toggleSort('status'),\n      sortByValue: () => self.toggleSort('value'),\n      sortIndName: arrow('name'),\n      sortIndStatus: arrow('status'),\n      sortIndValue: arrow('value'),\n\n      /* icons */\n      plusIcon: this.icon('plus', 15),\n      backIcon: this.icon('chevron-left', 15),\n      editIcon: this.icon('edit', 14),\n      trashIcon: this.icon('trash-2', 14),\n\n      /* detail */\n      sel: sel || {},\n      back: () => self.setState({ view: 'list', selId: null }),\n      setSelStatus: (e) => self.update(st.selId, { status: e.target.value }, 'Status updated'),\n      setSelValue: (e) => {\n        const v = e.target.value;\n        const schools2 = st.schools.map((x) => (x.id === st.selId ? { ...x, value: v === '' ? null : parseFloat(v) || 0 } : x));\n        self.setState({ schools: schools2 });\n      },\n      setSelNotes: (e) => {\n        const v = e.target.value;\n        const schools2 = st.schools.map((x) => (x.id === st.selId ? { ...x, notes: v } : x));\n        self.setState({ schools: schools2 });\n      },\n      persistBlur: () => self.persist(st.schools, 'Saved'),\n\n      /* school form */\n      form: form || {},\n      formContacts,\n      formTitle: st.formMode === 'add' ? 'Add a new school' : 'Edit ' + (form ? form.name : ''),\n      formSaveLabel: st.formMode === 'add' ? 'Add school' : 'Save changes',\n      regionOptions: ['Makkah', 'Riyadh', 'Eastern Province', 'Madinah', 'Qassim', 'Asir', 'Taif', 'Tabuk', 'Hail', 'Jazan', 'Najran', 'Al Jouf', 'Northern Borders', 'Al Baha'],\n      roleOptions: ['Owner', 'General Manager', 'Principal', 'Vice Principal', 'Academic Director', 'Academic Coordinator', 'English Coordinator', 'Registrar', 'Procurement', 'Finance', 'Accounting', 'Library', 'Marketing', 'Other'],\n      openAdd: () => self.setState({ view: 'form', formMode: 'add', form: self.emptyForm() }),\n      openEdit: () => {\n        if (!s) return;\n        self.setState({\n          view: 'form', formMode: 'edit',\n          form: { ...self.emptyForm(), ...s, value: s.value === null || s.value === undefined ? '' : String(s.value), contacts: (s.contacts || []).map((c) => ({ ...c })) }\n        });\n      },\n      cancelForm: () => self.setState({ view: st.formMode === 'edit' ? 'detail' : 'list', form: null }),\n      addFormContact: () => self.setState({ form: { ...form, contacts: form.contacts.concat([{ name: '', role: '', mobile: '', email: '', whatsapp: '', decisionMaker: false, primary: false, notes: '' }]) } }),\n      onFormInput: (e) => {\n        const f = e.target.dataset.field;\n        self.setState({ form: { ...form, [f]: e.target.value } });\n      },\n      saveSchool: () => {\n        if (!form || !form.name.trim()) { self.setState({ toast: 'School name is required' }); clearTimeout(self._toastT); self._toastT = setTimeout(() => self.setState({ toast: '' }), 1600); return; }\n        const clean = { ...form, name: form.name.trim(), value: form.value === '' ? null : parseFloat(form.value) || 0, contacts: form.contacts.filter((c) => c.name.trim()) };\n        let schools2, selId = st.selId;\n        if (st.formMode === 'add') {\n          const id = self.slug(clean.name);\n          schools2 = st.schools.concat([{ ...clean, id, orders: [], updatedAt: new Date().toISOString() }]);\n          selId = id;\n        } else {\n          schools2 = st.schools.map((x) => (x.id === st.selId ? { ...x, ...clean, updatedAt: new Date().toISOString() } : x));\n        }\n        self.setState({ schools: schools2, view: 'detail', selId, form: null });\n        self.persist(schools2, st.formMode === 'add' ? 'School added' : 'School updated');\n      },\n\n      /* delete */\n      confirmOpen: !!st.confirmId,\n      confirmName: (schools.find((x) => x.id === st.confirmId) || {}).name || '',\n      askDelete: () => self.setState({ confirmId: st.selId }),\n      cancelDelete: () => self.setState({ confirmId: null }),\n      confirmDelete: () => {\n        const schools2 = st.schools.filter((x) => x.id !== st.confirmId);\n        self.setState({ schools: schools2, confirmId: null, view: 'list', selId: null });\n        self.persist(schools2, 'School deleted');\n      },\n\n      /* order form */\n      orderFormOpen: !!st.oform,\n      orderFormTitle: st.oformMode === 'add' ? 'Add order' : 'Edit order',\n      oform: st.oform || {},\n      onOrderInput: (e) => {\n        const f = e.target.dataset.field;\n        self.setState({ oform: { ...st.oform, [f]: e.target.value } });\n      },\n      openAddOrder: () => self.setState({ oform: { id: '', date: new Date().toISOString().slice(0, 10), ref: '', title: '', items: '', value: '', status: s ? s.status : 'Quotation sent', docs: '', notes: '' }, oformMode: 'add' }),\n      closeOrderForm: () => self.setState({ oform: null }),\n      saveOrder: () => {\n        const o = st.oform;\n        if (!o || !o.title.trim() || !s) { return; }\n        const cleanO = { ...o, title: o.title.trim(), value: o.value === '' ? null : parseFloat(o.value) || 0 };\n        let orders;\n        if (st.oformMode === 'add') {\n          cleanO.id = s.id + '-o' + Date.now().toString(36);\n          orders = (s.orders || []).concat([cleanO]);\n        } else {\n          orders = (s.orders || []).map((x) => (x.id === o.id ? cleanO : x));\n        }\n        self.setState({ oform: null });\n        self.update(s.id, { orders }, st.oformMode === 'add' ? 'Order added' : 'Order updated');\n      },\n\n      /* import / export */\n      fileRef: (el) => { self._file = el; },\n      importClick: () => { if (self._file) self._file.click(); },\n      onImportFile: (e) => {\n        const f = e.target.files && e.target.files[0];\n        if (!f) return;\n        const rd = new FileReader();\n        rd.onload = () => {\n          try {\n            const o = JSON.parse(rd.result);\n            if (o && Array.isArray(o.schools)) {\n              self.setState({ schools: o.schools });\n              self.persist(o.schools, 'Backup restored');\n            } else { alert('Not a valid backup file.'); }\n          } catch (err) { alert('Could not read that file.'); }\n        };\n        rd.readAsText(f);\n        e.target.value = '';\n      },\n      exportJson: () => {\n        const blob = new Blob([JSON.stringify({ savedAt: new Date().toISOString(), schools: st.schools }, null, 2)], { type: 'application/json' });\n        const a = document.createElement('a');\n        a.href = URL.createObjectURL(blob);\n        a.download = 'school-sales-backup-' + new Date().toISOString().slice(0, 10) + '.json';\n        a.click();\n      },\n      exportCsv: () => {\n        const cols = ['name', 'code', 'city', 'district', 'region', 'curriculum', 'grades', 'status', 'value', 'phone', 'email', 'website', 'address', 'products', 'docs', 'notes', 'updatedAt'];\n        const esc = (v) => '\"' + String(v === null || v === undefined ? '' : v).replace(/\"/g, '\"\"') + '\"';\n        const lines = [cols.concat(['contacts']).join(',')];\n        st.schools.forEach((r) => {\n          const contactStr = (r.contacts || []).map((c) => [c.name, c.role, c.mobile, c.email].filter(Boolean).join(' / ')).join(' | ');\n          lines.push(cols.map((c) => esc(r[c])).concat([esc(contactStr)]).join(','));\n        });\n        const blob = new Blob(['\\ufeff' + lines.join('\\n')], { type: 'text/csv;charset=utf-8' });\n        const a = document.createElement('a');\n        a.href = URL.createObjectURL(blob);\n        a.download = 'school-sales-tracker.csv';\n        a.click();\n      },\n\n      /* cloud sync */\n      cloudDot: ({ off: 'rgba(255,255,255,0.4)', syncing: 'var(--gold-400)', synced: '#7dc98f', error: '#e08a8a' })[st.cloud] || 'rgba(255,255,255,0.4)',\n      cloudLabel: ({ off: 'Cloud sync: off — set up', syncing: 'Cloud: saving…', synced: 'Cloud: synced to GitHub', error: 'Cloud: error — open settings' })[st.cloud] || 'Cloud sync',\n      cloudOpen: st.cloudOpen,\n      cloudMsg: st.cloudMsg,\n      ghForm: st.ghForm || {},\n      ghConnected: !!this.ghCfg(),\n      openCloud: () => {\n        const cfg = self.ghCfg();\n        self.setState({ cloudOpen: true, ghForm: st.ghForm || (cfg ? { ...cfg } : { owner: 'ahmedgobashy85', repo: 'School-Sales-Tracker', branch: 'main', path: 'tracker-data.json', token: '' }) });\n      },\n      closeCloud: () => self.setState({ cloudOpen: false }),\n      onGhInput: (e) => {\n        const f = e.target.dataset.field;\n        self.setState({ ghForm: { ...st.ghForm, [f]: e.target.value } });\n      },\n      ghConnect: () => {\n        const f = st.ghForm || {};\n        if (!f.token || !f.token.trim()) { self.setState({ cloudMsg: 'Paste your GitHub token first.' }); return; }\n        const cfg = { owner: (f.owner || '').trim(), repo: (f.repo || '').trim(), branch: (f.branch || 'main').trim(), path: (f.path || 'tracker-data.json').trim(), token: f.token.trim() };\n        localStorage.setItem(self.GH_KEY, JSON.stringify(cfg));\n        self._sha = null;\n        let la = 0;\n        try { la = Date.parse(JSON.parse(localStorage.getItem(self.LS_KEY)).savedAt) || 0; } catch (err) { /* ignore */ }\n        self.setState({ cloudOpen: false, cloudMsg: '' });\n        self.cloudLoad(la);\n      },\n      ghDisconnect: () => {\n        localStorage.removeItem(self.GH_KEY);\n        self._sha = null;\n        self.setState({ cloud: 'off', cloudOpen: false, ghForm: null, cloudMsg: '' });\n      },\n\n      toast: st.toast\n    };\n  }\n\n  toggleSort(k) {\n    if (this.state.sortKey === k) this.setState({ sortDir: -this.state.sortDir });\n    else this.setState({ sortKey: k, sortDir: k === 'value' ? -1 : 1 });\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
